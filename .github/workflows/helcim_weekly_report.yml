name: Helcim Weekly Ads Report

on:
  schedule:
    # Every Monday at 8:00am ET (12:00 UTC / EDT)
    - cron: "0 12 * * 1"
  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-ads

      - name: Write google-ads.yaml
        run: |
          cat > ~/google-ads.yaml << EOF
          developer_token: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          client_id: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          client_secret: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          refresh_token: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          login_customer_id: "${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}"
          use_proto_plus: True
          EOF

      - name: Run weekly report
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/helcim_weekly_report.py
